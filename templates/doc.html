{% extends "base.html" %}
{% block title %}{{ title }} — {{ site_title }}{% endblock %}
{% block body %}
<div class="layout">
  {% include "_sidebar.html" %}
  <main class="content doc">
    {{ content | safe }}
    {% if last_updated %}
    <div class="last-updated">Last updated {{ last_updated }}</div>
    {% endif %}
  </main>
</div>
{% endblock %}
