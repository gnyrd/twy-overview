<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TWY Docs — Sign in</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #d4a574 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .logo { font-size: 22px; font-weight: 800; color: #222; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input[type=password] {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 15px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    input[type=password]:focus { outline: none; border-color: #fda085; }
    button {
      width: 100%;
      padding: 11px;
      background: #fda085;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #e8885e; }
    .error { color: #d00; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TWY Docs</div>
    <div class="subtitle">Tiffany Wood Yoga</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autofocus autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
